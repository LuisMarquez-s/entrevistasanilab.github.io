<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanilab - Sistema de Registro</title>
  <link rel="icon" type="image/png" href="sanilab.png">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(rgba(2, 44, 34, 0.88), rgba(2, 44, 34, 0.88)), url('https://static.wixstatic.com/media/5c368f_a2ce98e0758346f8b3298b5e9f426216~mv2.jpeg/v1/fit/w_776,h_485,q_90,enc_avif,quality_auto/5c368f_a2ce98e0758346f8b3298b5e9f426216~mv2.jpeg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white; 
      text-align: center; 
      padding: 20px; 
    }
    .box { 
      background: #064e3b;
      padding: 25px; 
      border-radius: 12px; 
      max-width: 720px; 
      margin: auto; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
    }
    input, select, textarea { 
      padding: 12px; 
      width: 85%; 
      margin: 10px auto; 
      display: block; 
      border-radius: 6px; 
      border: none; 
      font-size: 16px; 
      box-sizing: border-box;
    }
    button { 
      padding: 12px 28px; 
      margin: 10px 5px; 
      background: #22c55e; 
      border: none; 
      color: white; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 16px; 
      font-weight: bold; 
    }
    button:disabled { background: #047857; cursor: not-allowed; }
    button.atras { background: #047857; }
    .botones-verticales button { display: block; width: 85%; margin: 10px auto; }
    .tiktok-player { 
      width: 100%; max-width: 380px; height: 620px; 
      margin: 15px auto; border-radius: 12px; overflow: hidden; background: #000; 
    }
    .cam-box { 
      width: 260px; height: 260px; margin: 15px auto; border-radius: 12px; 
      overflow: hidden; border: 3px solid #22c55e; background: black; 
    }
    .cam-box video { width: 100%; height: 100%; object-fit: cover; }
    .resumen { 
      text-align: left; background: #047857; padding: 18px; 
      border-radius: 10px; margin: 20px auto; max-width: 550px; line-height: 1.6; 
    }
    .warning { color: #facc15; font-weight: bold; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box" id="app"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzI0-rRxFOArP5HElYRY5MqQrJOqYRD-pzoeEA54x0eSV3_YFf5ZvpYC_V9gHdwhHM/exec";

    let paso = 1;
    let datos = {
      nombre: "", email: "", telefono: "", telefonoRef: "", redes: "",
      tipoUsuario: "", subTipo: "", area: "",
      dias: [], horaInicio: "", horaFin: "", modalidad: "", ubicacion: "",
      horaInicio1: "", horaFin1: "", horaInicio2: "", horaFin2: "",
      diasPresencial: [], diasRemoto: [], cambios: "",
      videoPresentacion: "", cvUrl: "",
      base64Video1: "", base64CV: "", cvMimeType: "", cvExt: "",
      experienciaPrevia: "", textoRetiro: ""
    };

    let stream, mediaRecorder, chunks = [];

    const areasPresencial = ["Infraestructura", "Relaciones Comunitarias", "Medio Ambiente", "Logística y Procesos"];

    async function enviarApi(payload) {
      try {
        const respuesta = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const textoRespuesta = await respuesta.text();
        return JSON.parse(textoRespuesta);
      } catch (error) {
        return { success: false, message: "Error de red al conectar con el servidor." };
      }
    }

    function render() {
      let html = "";

      switch(paso) {
        case 1:
          html = `
            <h2>👋 Hola. Bienvenido al Sistema de Entrevista de Sanilab</h2>
            <p>Ingresa tu nombre y apellido completo.Pero primero mira este pequeño video para que nos conozcas mejor:</p>
            <div class="tiktok-player">
              <iframe src="https://drive.google.com/file/d/1_kGf5wxshyt-Y1uDB3STOYvyFRt9BH5y/preview" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <input id="nombre" placeholder="Nombre completo *" value="${datos.nombre}">
            <button onclick="guardarNombre()">Continuar</button>
          `;
          break;

        case 2:
          html = `
            <h2>🎥 Preséntate</h2>
            <p>Ahora queremos conocerte mejor 😊. Mira este video y luego graba tu presentación.</p>
            <div class="tiktok-player">
              <iframe src="https://drive.google.com/file/d/1uXKmdZYM8s5jZlf8MbpUgBQG18VlWffn/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="cam-box"><video id="video" autoplay playsinline></video></div>
            
            <div class="botones-verticales">
              <button onclick="startCam('video')">📷 Activar cámara</button>
              <button onclick="startRec(1)" id="btnGrabar">🎥 Grabar</button>
              <button onclick="stopRec()" id="btnDetener" disabled>⏹ Detener</button>
            </div>
            
            <div id="preview"></div>
            <p><strong>Descarga tu video antes de subirlo.</strong></p>
            <button onclick="descargarVideo()">⬇️ Descargar Video de Presentación</button>
            
            <div style="background: #047857; padding: 15px; border-radius: 8px; margin: 20px auto; width: 85%; text-align: left;">
              <p style="margin-top: 0;"><strong>📤 Sube tu video aquí para continuar:</strong></p>
              <input type="file" id="videoUpload1" accept="video/*" style="width: 100%; padding: 5px;">
              <p style="font-size: 13px; color: #a7f3d0; margin-bottom: 0;">Tamaño máximo: 30 MB</p>
            </div>
            <button onclick="guardarVideoLocal(1, 'videoUpload1')">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 3:
          html = `
            <h2>🧾 Tus Datos de Contacto</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1MZhtvEYAFAooVBbYT26nqbjwK8cqwSuT/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <input id="email" type="email" placeholder="Correo electrónico *" value="${datos.email}">
            <input id="telefono" type="tel" placeholder="Tu Teléfono principal *" value="${datos.telefono}">
            <input id="telefonoRef" type="tel" placeholder="Teléfono de familiar/referencia *" value="${datos.telefonoRef}">
            <input id="redes" type="text" placeholder="Link de tu LinkedIn, Instagram o Facebook *" value="${datos.redes}">
            <button onclick="saveData()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 4:
          let alertaArea = "";
          if (datos.area === "Sistemas" || datos.area === "Marketing") {
            alertaArea = `<p class="warning">📌 Nota: Esta área rara vez será presencial.</p>`;
          }

          html = `
            <h2>🧑‍🎓 Perfil y Área</h2>
            <select id="tipoUsuario" onchange="actualizarTipo()">
              <option value="">Modalidad de ingreso...</option>
              <option value="Voluntario" ${datos.tipoUsuario==='Voluntario'?'selected':''}>Voluntario</option>
              <option value="Estudiante" ${datos.tipoUsuario==='Estudiante'?'selected':''}>Estudiante</option>
              <option value="Egresado" ${datos.tipoUsuario==='Egresado'?'selected':''}>Egresado</option>
            </select>
            
            <div id="subtipoDiv" style="display:${datos.tipoUsuario==='Estudiante'?'block':'none'}">
              <select id="subTipo">
                <option value="Practicante" ${datos.subTipo==='Practicante'?'selected':''}>Practicante</option>
                <option value="Remunerado" ${datos.subTipo==='Remunerado'?'selected':''}>Remunerado</option>
              </select>
            </div>
            
            <select id="area" onchange="actualizarTipo()" style="margin-top: 20px;">
              <option value="">Área a postular...</option>
              ${["Proyectos", "Medio Ambiente", "Gerencia", "GTH", "Marketing", "Infraestructura", "Relaciones Comunitarias", "Taller", "Sistemas", "Comercial", "Logística y Procesos"]
                .map(a => `<option value="${a}" ${datos.area===a?'selected':''}>${a}</option>`).join('')}
            </select>
            ${alertaArea}
            <button onclick="guardarTipo()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;
          
        case 5:
          html = `
            <h2>⏰ Disponibilidad de Horario</h2>
            <div style="background: #064e3b; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857; box-sizing: border-box;">
              <p style="margin-top:0; color:#22c55e; font-weight:bold;">1. Días disponibles:</p>
              <div style="display:flex; flex-wrap:wrap; gap:10px;">
                ${['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'].map(dia => `
                  <label style="flex: 1 1 30%;"><input type="checkbox" class="cb-dia" value="${dia}" ${datos.dias.includes(dia)?'checked':''}> ${dia}</label>
                `).join('')}
              </div>
            </div>
            
            <div style="background: #064e3b; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857; box-sizing: border-box;">
              <p style="margin-top:0; color:#22c55e; font-weight:bold;">2. Turno Principal:</p>
              <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Hora Inicio</label>
                  <input type="time" id="horaInicio1" style="width: 100%; margin: 5px 0 0 0;" value="${datos.horaInicio1 || ''}">
                </div>
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Hora Fin</label>
                  <input type="time" id="horaFin1" style="width: 100%; margin: 5px 0 0 0;" value="${datos.horaFin1 || ''}">
                </div>
              </div>
            </div>

            <div style="background: #064e3b; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857; box-sizing: border-box;">
              <label style="display:flex; align-items:center; cursor:pointer; color:#a7f3d0; font-weight:bold;">
                <input type="checkbox" id="checkTurno2" onchange="toggleTurno2()" ${datos.horaInicio2 ? 'checked' : ''} style="width:auto; margin:0 10px 0 0;">
                + Agregar horario partido (Turno 2)
              </label>
              <div id="turno2Div" style="display:${datos.horaInicio2 ? 'flex' : 'none'}; gap: 10px; margin-top: 15px;">
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Regreso - Inicio</label>
                  <input type="time" id="horaInicio2" style="width: 100%; margin: 5px 0 0 0;" value="${datos.horaInicio2 || ''}">
                </div>
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Salida Final</label>
                  <input type="time" id="horaFin2" style="width: 100%; margin: 5px 0 0 0;" value="${datos.horaFin2 || ''}">
                </div>
              </div>
            </div>

            <button onclick="guardarHorario()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 6:
          const esPresencialFijo = areasPresencial.includes(datos.area);
          
          let selectModalidadHtml = "";
          if (esPresencialFijo) {
            selectModalidadHtml = `
              <div style="background:#047857; padding:15px; border-radius:8px; margin-bottom:15px;">
                ⚠️ Debido a que postulas a <strong>${datos.area}</strong>, el trabajo es estrictamente Presencial.
              </div>
            `;
            datos.modalidad = "Presencial";
          } else {
            selectModalidadHtml = `
              <select id="modalidad" onchange="actualizarModalidad()">
                <option value="">Selecciona modalidad...</option>
                <option value="Presencial" ${datos.modalidad==='Presencial'?'selected':''}>Presencial</option>
                <option value="Remoto" ${datos.modalidad==='Remoto'?'selected':''}>Remoto</option>
                <option value="Híbrido" ${datos.modalidad==='Híbrido'?'selected':''}>Híbrido</option>
              </select>
            `;
          }

          html = `
            <h2>🏢 Modalidad de Trabajo</h2>
            ${selectModalidadHtml}
            
            <div id="ubicacionDiv" style="display:${datos.modalidad==='Presencial' || esPresencialFijo ? 'block' : 'none'}">
              <select id="ubicacion">
                <option value="">Elige tu sede...</option>
                <option value="Lima - Casaverde - Pachacamac" ${datos.ubicacion==='Lima - Casaverde - Pachacamac'?'selected':''}>Lima - Casaverde - Pachacamac</option>
              </select>
            </div>
            
            <div id="hibridoDiv" style="display:${datos.modalidad==='Híbrido' && !esPresencialFijo ? 'block' : 'none'}">
              <p>Distribuye tus <strong>${datos.dias.length} días</strong> disponibles:</p>
              <div style="display: flex; justify-content: space-between; max-width: 400px; margin: 0 auto; text-align: left; background: #047857; padding: 15px; border-radius: 8px;">
                <div style="width: 45%;">
                  <p style="color:#22c55e; font-weight:bold;">Presencial</p>
                  ${datos.dias.map(d => `<label style="display:block;"><input type="checkbox" class="cb-presencial" value="${d}" ${datos.diasPresencial.includes(d)?'checked':''}> ${d}</label>`).join('')}
                </div>
                <div style="width: 45%;">
                  <p style="color:#a7f3d0; font-weight:bold;">Remoto</p>
                  ${datos.dias.map(d => `<label style="display:block;"><input type="checkbox" class="cb-remoto" value="${d}" ${datos.diasRemoto.includes(d)?'checked':''}> ${d}</label>`).join('')}
                </div>
              </div>
            </div>
            <button onclick="guardarModalidad()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 7:
          html = `<h2>📱 Video Informativo</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1OlcWP62G7P6rPbgCmtNBixNzK9_puDWq/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button><br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;  

        case 8:
          html = `<h2>✍️ Solicitud de Cambios</h2>
            <textarea id="cambios" rows="5" placeholder="Ejemplo: Prefiero entrar más temprano los miércoles...">${datos.cambios || ''}</textarea>
            <button onclick="guardarCambios()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 9:
          html = `<h2>📈 Productividad</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1senVZJhKpglTAGZe8_W7BQTVSUWzkCWC/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button><br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 10:
          html = `
            <h2>🚪 Experiencia Laboral</h2>
            <select id="expPrevia" onchange="actualizarExp()">
              <option value="">¿Tienes experiencia laboral previa?</option>
              <option value="Si" ${datos.experienciaPrevia==='Si'?'selected':''}>Sí</option>
              <option value="No" ${datos.experienciaPrevia==='No'?'selected':''}>No</option>
            </select>

            <div id="retiroDiv" style="display:${datos.experienciaPrevia==='Si'?'block':'none'}">
              <p style="margin-top:15px;">Cuéntanos brevemente el motivo de retiro de tu último empleo:</p>
              <textarea id="textoRetiro" rows="4">${datos.textoRetiro || ''}</textarea>
            </div>
            
            <button onclick="guardarRetiro()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 11:
          html = `
            <h2>📄 Sube tu CV</h2>
            <p>Por favor, sube tu Currículum Vitae (Formato PDF o Word).</p>
            <div style="background: #047857; padding: 20px; border-radius: 8px; margin: 15px auto; width: 85%;">
              <input type="file" id="cvUpload" accept=".pdf,.doc,.docx" style="width: 100%; color: white;">
            </div>
            <button onclick="guardarCVLocal()">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 12:
          html = `
            <h2>✅ Resumen Final de tu Registro</h2>
            <div class="resumen">
              <p><strong>Nombre:</strong> ${datos.nombre}</p>
              <p><strong>Área:</strong> ${datos.area}</p>
              <p><strong>Modalidad:</strong> ${datos.modalidad} ${datos.ubicacion ? `(${datos.ubicacion})` : ''}</p>
              <p><strong>Horario:</strong> ${datos.horaInicio2 ? datos.horaInicio1 + ' a ' + datos.horaFin1 + ' y ' + datos.horaInicio2 + ' a ' + datos.horaFin2 : datos.horaInicio1 + ' a ' + datos.horaFin1}</p>
            </div>
            <button onclick="finalizarRegistro(event)" style="background:#22c55e; padding:14px 32px; font-size:18px;">Finalizar Registro</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;
      }

      document.getElementById("app").innerHTML = html;
    }

    function apagarCamara() { if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; } }
    async function startCam(id) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        document.getElementById(id).srcObject = stream;
      } catch(e) { alert("Activa permisos de cámara y micrófono."); }
    }
    
    function startRec(tipo) {
      if (!stream) return alert("Primero activa la cámara");
      document.getElementById("btnGrabar").disabled = true;
      document.getElementById("btnDetener").disabled = false;
      chunks = [];
      try { mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' }); } 
      catch (e) { mediaRecorder = new MediaRecorder(stream); }

      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
        document.getElementById("preview").innerHTML = `<video src="${url}" controls width="100%"></video><p style="color:#22c55e;">✅ Grabación finalizada. Descárgalo y súbelo abajo.</p>`;
      };
      mediaRecorder.start();
    }

    function stopRec() {
      if (mediaRecorder) mediaRecorder.stop();
      document.getElementById("btnGrabar").disabled = false;
      document.getElementById("btnDetener").disabled = true;
      apagarCamara();
    }

    function descargarVideo() {
      if (chunks.length === 0) return alert("Primero graba un video.");
      const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
      const a = document.createElement('a');
      a.style.display = 'none'; a.href = url; a.download = `Video_${datos.nombre || 'Sanilab'}.webm`;
      document.body.appendChild(a); a.click();
    }

    function guardarNombre() { datos.nombre = document.getElementById("nombre").value.trim(); if(!datos.nombre) return alert("Ingresa tu nombre"); next(); }
    
    function saveData() { 
      datos.email = document.getElementById("email").value.trim(); datos.telefono = document.getElementById("telefono").value.trim(); 
      datos.telefonoRef = document.getElementById("telefonoRef").value.trim(); datos.redes = document.getElementById("redes").value.trim(); 
      if (!datos.email || !datos.telefono || !datos.telefonoRef) return alert("Completa los datos obligatorios.");
      if (datos.telefono === datos.telefonoRef) return alert("El teléfono de referencia debe ser distinto.");
      next(); 
    }
    
    function actualizarTipo() {
      const ts = document.getElementById("tipoUsuario"); const as = document.getElementById("area");
      if(ts) datos.tipoUsuario = ts.value; if(as) datos.area = as.value;
      render();
    }
    
    function guardarTipo() {
      datos.tipoUsuario = document.getElementById("tipoUsuario").value;
      datos.subTipo = datos.tipoUsuario === "Estudiante" ? document.getElementById("subTipo").value : "";
      datos.area = document.getElementById("area").value;
      if (!datos.tipoUsuario || !datos.area) return alert("Selecciona modalidad de ingreso y área.");
      next();
    }

    function toggleTurno2() {
      const isChecked = document.getElementById("checkTurno2").checked;
      document.getElementById("turno2Div").style.display = isChecked ? "flex" : "none";
      if (!isChecked) {
        document.getElementById("horaInicio2").value = "";
        document.getElementById("horaFin2").value = "";
      }
    }

    function guardarHorario() {
      datos.dias = Array.from(document.querySelectorAll('.cb-dia:checked')).map(cb => cb.value); 
      if (datos.dias.length === 0) return alert("Selecciona al menos un día.");
      datos.horaInicio1 = document.getElementById("horaInicio1").value; 
      datos.horaFin1 = document.getElementById("horaFin1").value;
      
      if (!datos.horaInicio1 || !datos.horaFin1) return alert("Ingresa las horas del Turno Principal.");
      
      const checkT2 = document.getElementById("checkTurno2").checked;
      const hI2 = document.getElementById("horaInicio2") ? document.getElementById("horaInicio2").value : "";
      const hF2 = document.getElementById("horaFin2") ? document.getElementById("horaFin2").value : "";

      if (checkT2 && (!hI2 || !hF2)) {
        return alert("Has activado el horario partido. Debes ingresar las horas del segundo turno o desmarcar la casilla.");
      }

      datos.horaInicio2 = checkT2 ? hI2 : "";
      datos.horaFin2 = checkT2 ? hF2 : "";
      
      // Asignar variables globales para el Backend
      datos.horaInicio = datos.horaInicio1; 
      datos.horaFin = datos.horaFin1;
      
      next();
    }

    function actualizarModalidad() { if(document.getElementById("modalidad")) datos.modalidad = document.getElementById("modalidad").value; render(); }
    
    function guardarModalidad() {
      if(!document.getElementById("modalidad")) datos.modalidad = "Presencial";
      else datos.modalidad = document.getElementById("modalidad").value;
      
      if (!datos.modalidad) return alert("Selecciona una modalidad.");
      
      if (datos.modalidad === "Presencial") {
        datos.ubicacion = document.getElementById("ubicacion").value;
        if(!datos.ubicacion) return alert("Selecciona una sede obligatoriamente.");
      } else if (datos.modalidad === "Híbrido") {
        const pre = Array.from(document.querySelectorAll('.cb-presencial:checked')).map(cb => cb.value);
        const rem = Array.from(document.querySelectorAll('.cb-remoto:checked')).map(cb => cb.value);
        if (pre.length + rem.length !== datos.dias.length) return alert("Distribuye exactamente los días elegidos.");
        datos.diasPresencial = pre; datos.diasRemoto = rem;
      }
      next();
    }
    
    function guardarCambios() { datos.cambios = document.getElementById("cambios").value.trim(); next(); }

    function actualizarExp() { datos.experienciaPrevia = document.getElementById("expPrevia").value; render(); }
    
    function guardarRetiro() {
      if(!datos.experienciaPrevia) return alert("Selecciona una opción.");
      if(datos.experienciaPrevia === "Si") {
        datos.textoRetiro = document.getElementById("textoRetiro").value.trim();
        if(!datos.textoRetiro) return alert("Por favor escribe el motivo.");
      } else { datos.textoRetiro = "Sin experiencia previa"; }
      next();
    }

    function guardarVideoLocal(tipo, inputId) {
      const input = document.getElementById(inputId);
      if (!input || input.files.length === 0) return alert("Sube el video para continuar.");
      let reader = new FileReader();
      reader.onloadend = function () {
        datos.base64Video1 = reader.result.split(",");
        next();
      };
      reader.readAsDataURL(input.files[0]);
    }

    function guardarCVLocal() {
      const input = document.getElementById('cvUpload');
      if (!input || input.files.length === 0) return alert("Selecciona tu CV (PDF/Word).");
      
      const archivo = input.files[0];
      datos.cvMimeType = archivo.type;
      datos.cvExt = archivo.name.split('.').pop();
      
      let reader = new FileReader();
      reader.onloadend = function () {
        datos.base64CV = reader.result.split(",");
        next();
      };
      reader.readAsDataURL(archivo);
    }

    async function finalizarRegistro(e) {
      e.target.disabled = true; e.target.innerText = "⏳ Guardando...";
      const appDiv = document.getElementById("app");
      appDiv.innerHTML = `<h2>⏳ Procesando registro...</h2><p id="estadoProceso" style="color:#22c55e;">Iniciando...</p>`;
      const estado = document.getElementById('estadoProceso');
      
      try {
        if (datos.base64Video1) {
          estado.innerText = "Subiendo video de presentación (1/3)...";
          const resV1 = await enviarApi({ accion: "guardarVideo", base64: datos.base64Video1, tipo: 1, nombre: datos.nombre });
          if (!resV1.success) throw new Error("Falló el video.");
          datos.videoPresentacion = resV1.url;
        }
        if (datos.base64CV) {
          estado.innerText = "Subiendo CV (2/3)...";
          const resCV = await enviarApi({ accion: "subirCV", base64: datos.base64CV, nombre: datos.nombre, mimeType: datos.cvMimeType, extension: datos.cvExt });
          if (!resCV.success) throw new Error("Falló la subida del CV.");
          datos.cvUrl = resCV.url;
        }
        estado.innerText = "Guardando datos (3/3)...";
        const resFinal = await enviarApi({ accion: "guardarRegistro", datos: datos });
        
        if (resFinal.success) { appDiv.innerHTML = `<h2>🎉 ¡Registro Completado!</h2><p>Nos pondremos en contacto pronto.</p>`; } 
        else { throw new Error("Fallo al guardar."); }
      } catch (error) {
        appDiv.innerHTML = `<h2>❌ Ocurrió un error</h2><p>${error.message}</p><button onclick="render()">Reintentar</button>`;
      }
    }

    function next() { apagarCamara(); paso++; render(); }
    function prev() { apagarCamara(); if (paso > 1) { paso--; render(); } }
    render();
  </script>
</body>
</html>
