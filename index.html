<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanilab - Sistema de Registro</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
    .box { background: #1e293b; padding: 25px; border-radius: 12px; max-width: 720px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    input, select, textarea { padding: 12px; width: 85%; margin: 10px auto; display: block; border-radius: 6px; border: none; font-size: 16px; }
    button { padding: 12px 28px; margin: 10px 5px; background: #22c55e; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:disabled { background: #64748b; cursor: not-allowed; }
    button.atras { background: #64748b; }
    .tiktok-player { width: 100%; max-width: 380px; height: 620px; margin: 15px auto; border-radius: 12px; overflow: hidden; background: #000; }
    .cam-box { width: 260px; height: 260px; margin: 15px auto; border-radius: 12px; overflow: hidden; border: 3px solid #22c55e; background: black; }
    .cam-box video { width: 100%; height: 100%; object-fit: cover; }
    .resumen { text-align: left; background: #334155; padding: 18px; border-radius: 10px; margin: 20px auto; max-width: 550px; line-height: 1.6; }
    .upload-box { background: #334155; padding: 15px; border-radius: 8px; margin: 20px auto; width: 85%; text-align: left; }
  </style>
</head>
<body>
  <div class="box" id="app"></div>

  <script>
    // REEMPLAZA ESTA URL POR LA TUYA DE GOOGLE APPS SCRIPT
    const API_URL = "https://script.google.com/macros/s/AKfycbz7aRFTQr8dw57UR22QFjy1atq-Vpwoy8Kg9CUKcF2963_lxcbV9o3m8Vk6ls_haS2Q/exec";

    let paso = 1;
    let datos = {
      nombre: "", email: "", telefono: "", tipoUsuario: "", subTipo: "",
      dias: [], horaInicio: "", horaFin: "", modalidad: "", ubicacion: "",
      diasPresencial: [], diasRemoto: [], cambios: "", firmaUrl: "",
      videoPresentacion: "", videoProductividad: "", videoRetiro: ""
    };

    let stream, mediaRecorder, chunks = [];

    async function enviarApi(payload) {
      try {
        const respuesta = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const texto = await respuesta.text();
        return JSON.parse(texto);
      } catch (error) {
        return { success: false, message: "Error de red." };
      }
    }

    function render() {
      let html = "";
      switch(paso) {
        case 1:
          html = `<h2>👋 Bienvenido a Sanilab</h2><p>Mira este video antes de empezar:</p>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1_kGf5wxshyt-Y1uDB3STOYvyFRt9BH5y/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <input id="nombre" placeholder="Nombre completo *" value="${datos.nombre}">
            <button onclick="guardarNombre()">Continuar</button>`;
          break;

        case 2:
          html = `<h2>🎥 Presentación</h2><p>Graba y descarga tu video de presentación, luego súbelo aquí:</p>
            <div class="cam-box"><video id="video" autoplay playsinline></video></div>
            <button onclick="startCam('video')">📷 Activar cámara</button>
            <button onclick="startRec()" id="btnGrabar">🎥 Grabar</button>
            <button onclick="stopRec()" id="btnDetener" disabled>⏹ Detener</button>
            <div id="preview"></div>
            <button onclick="descargarVideo()">⬇️ Descargar Video</button>
            <div class="upload-box">
              <input type="file" id="videoUpload1" accept="video/*">
            </div>
            <button id="btnSubirV1" onclick="validarYSubirVideo(1, 'videoUpload1', 'btnSubirV1')">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 3:
          html = `<h2>🧾 Contacto</h2><input id="email" type="email" placeholder="Correo *" value="${datos.email}">
            <input id="telefono" placeholder="Teléfono *" value="${datos.telefono}">
            <button onclick="saveData()">Continuar</button><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 4:
          html = `<h2>🧑‍🎓 Tipo de Usuario</h2><select id="tipoUsuario" onchange="actualizarTipo()">
            <option value="">Selecciona...</option>
            <option value="Estudiante" ${datos.tipoUsuario==='Estudiante'?'selected':''}>Estudiante</option>
            <option value="Egresado" ${datos.tipoUsuario==='Egresado'?'selected':''}>Egresado</option></select>
            <div id="subtipoDiv" style="display:${datos.tipoUsuario==='Estudiante'?'block':'none'}">
              <select id="subTipo"><option value="Pasante">Pasante</option><option value="Practicante">Practicante</option></select></div>
            <button onclick="guardarTipo()">Continuar</button><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 5:
          html = `<h2>⏰ Horario</h2><div style="text-align:left; max-width:200px; margin:auto;">
            ${['Lunes','Martes','Miércoles','Jueves','Viernes'].map(d => `<label><input type="checkbox" value="${d}"> ${d}</label><br>`).join('')}</div>
            <input type="time" id="horaInicio"><input type="time" id="horaFin">
            <button onclick="guardarHorario()">Continuar</button><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 6:
          html = `<h2>🏢 Modalidad</h2><select id="modalidad"><option value="Remoto">Remoto</option><option value="Presencial">Presencial</option><option value="Híbrido">Híbrido</option></select>
            <button onclick="guardarModalidad()">Continuar</button><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 7:
          html = `<h2>📱 Video Informativo</h2><div class="tiktok-player"><iframe src="https://www.tiktok.com/player/v1/7537859903172414728" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 8:
          html = `<h2>✍️ Solicitud de Cambios</h2><textarea id="cambios" rows="5" placeholder="Escribe aquí si necesitas algún ajuste..."></textarea>
            <button onclick="guardarCambios()">Continuar</button><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 9:
          html = `<h2>📈 Productividad</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1senVZJhKpglTAGZe8_W7BQTVSUWzkCWC/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <p>Mira el video sobre productividad antes de continuar.</p>
            <button onclick="next()">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 10:
          html = `<h2>🚪 Retiro</h2><p>Cuéntanos sobre tu último empleo:</p>
            <div class="cam-box"><video id="video3" autoplay playsinline></video></div>
            <button onclick="startCam('video3')">📷 Activar cámara</button>
            <button onclick="startRec()" id="btnGrabar">🎥 Grabar</button>
            <button onclick="stopRec()" id="btnDetener" disabled>⏹ Detener</button>
            <div id="preview"></div>
            <div class="upload-box"><input type="file" id="videoUpload3" accept="video/*"></div>
            <button id="btnSubirV3" onclick="validarYSubirVideo(3, 'videoUpload3', 'btnSubirV3')">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 11:
          html = `<h2>✍️ Firma Digital</h2>
            <p>Por favor, sube una foto o imagen de tu firma.</p>
            <div class="upload-box">
              <input type="file" id="firmaUpload" accept="image/*" style="width: 100%;">
            </div>
            <button id="btnSubirFirma" onclick="validarYSubirFirma()">Subir Firma y Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 12:
          html = `<h2>✅ Confirmación</h2><div class="resumen"><p><strong>Nombre:</strong> ${datos.nombre}</p></div>
            <button onclick="finalizarRegistro(event)">Finalizar Registro</button><br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        default:
          html = `<h2>🎉 ¡Listo!</h2><p>Registro completado con éxito.</p>`;
      }
      document.getElementById("app").innerHTML = html;
    }

    async function validarYSubirVideo(tipo, inputId, btnId) {
      const input = document.getElementById(inputId);
      if (!input || input.files.length === 0) return alert("Selecciona el archivo.");
      const btn = document.getElementById(btnId);
      btn.innerText = "⏳ Subiendo..."; btn.disabled = true;
      let reader = new FileReader();
      reader.onloadend = async function () {
        const base64 = reader.result.split(",");
        const res = await enviarApi({ accion: "guardarVideo", base64, tipo, nombre: datos.nombre });
        if (res.success) { 
          if(tipo===1) datos.videoPresentacion = res.url; 
          if(tipo===3) datos.videoRetiro = res.url;
          next(); 
        } else { alert("Error al subir."); btn.innerText = "Continuar"; btn.disabled = false; }
      };
      reader.readAsDataURL(input.files);
    }

    async function validarYSubirFirma() {
      const input = document.getElementById('firmaUpload');
      if (!input || input.files.length === 0) return alert("Selecciona la imagen de tu firma.");
      const btn = document.getElementById("btnSubirFirma");
      btn.innerText = "⏳ Guardando..."; btn.disabled = true;
      let reader = new FileReader();
      reader.onloadend = async function () {
        const base64 = reader.result.split(",");
        const res = await enviarApi({ accion: "subirFirma", base64, nombre: datos.nombre });
        if (res.success) { datos.firmaUrl = res.url; next(); }
        else { alert("Error."); btn.innerText = "Subir Firma y Continuar"; btn.disabled = false; }
      };
      reader.readAsDataURL(input.files);
    }

    function apagarCamara() { if (stream) stream.getTracks().forEach(t => t.stop()); stream = null; }
    async function startCam(id) { try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); document.getElementById(id).srcObject = stream; } catch(e) { alert("Activa los permisos."); } }
    function startRec() { chunks = []; mediaRecorder = new MediaRecorder(stream); mediaRecorder.ondataavailable = e => chunks.push(e.data); mediaRecorder.onstop = () => { const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' })); document.getElementById("preview").innerHTML = `<video src="${url}" controls width="100%"></video>`; }; mediaRecorder.start(); document.getElementById("btnGrabar").disabled = true; document.getElementById("btnDetener").disabled = false; }
    function stopRec() { mediaRecorder.stop(); document.getElementById("btnGrabar").disabled = false; document.getElementById("btnDetener").disabled = true; apagarCamara(); }
    function descargarVideo() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' })); a.download = "video.webm"; a.click(); }

    function guardarNombre() { datos.nombre = document.getElementById("nombre").value.trim(); if(datos.nombre) next(); else alert("Falta nombre"); }
    function saveData() { datos.email = document.getElementById("email").value; datos.telefono = document.getElementById("telefono").value; next(); }
    function actualizarTipo() { datos.tipoUsuario = document.getElementById("tipoUsuario").value; render(); }
    function guardarTipo() { datos.tipoUsuario = document.getElementById("tipoUsuario").value; next(); }
    function guardarHorario() { datos.dias = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value); next(); }
    function guardarModalidad() { datos.modalidad = document.getElementById("modalidad").value; next(); }
    function guardarCambios() { datos.cambios = document.getElementById("cambios").value; next(); }

    async function finalizarRegistro(e) {
      document.getElementById("app").innerHTML = "<h2>⏳ Guardando todo...</h2>";
      const res = await enviarApi({ accion: "guardarRegistro", datos: datos });
      if (res.success) document.getElementById("app").innerHTML = `<h2>🎉 ¡Éxito!</h2><p>${res.message}</p>`;
      else alert("Error final.");
    }

    function next() { apagarCamara(); paso++; render(); }
    function prev() { apagarCamara(); if(paso > 1) { paso--; render(); } }

    render();
  </script>
</body>
</html>
