<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanilab - Sistema de Registro</title>
  <link rel="icon" type="image/png" href="sanilab.png">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(rgba(2, 44, 34, 0.88), rgba(2, 44, 34, 0.88)), url('https://static.wixstatic.com/media/5c368f_a2ce98e0758346f8b3298b5e9f426216~mv2.jpeg/v1/fit/w_776,h_485,q_90,enc_avif,quality_auto/5c368f_a2ce98e0758346f8b3298b5e9f426216~mv2.jpeg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white; 
      text-align: center; 
      padding: 20px; 
    }
    .box { 
      background: #064e3b;
      padding: 25px; 
      border-radius: 12px; 
      max-width: 720px; 
      margin: auto; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
    }
    input, select, textarea { 
      padding: 12px; 
      width: 85%; 
      margin: 10px auto; 
      display: block; 
      border-radius: 6px; 
      border: none; 
      font-size: 16px; 
      box-sizing: border-box;
    }
    button { 
      padding: 12px 28px; 
      margin: 10px 5px; 
      background: #22c55e; 
      border: none; 
      color: white; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 16px; 
      font-weight: bold; 
    }
    button:disabled { background: #047857; cursor: not-allowed; }
    button.atras { background: #047857; }
    
    .btn-chico { 
      display: block; 
      width: 60%; 
      max-width: 250px; 
      margin: 8px auto; 
      padding: 10px 15px; 
      font-size: 14.5px; 
    }

    .tiktok-player { 
      width: 100%; max-width: 380px; height: 620px; 
      margin: 15px auto; border-radius: 12px; overflow: hidden; background: #000; 
    }
    .cam-box { 
      width: 260px; height: 260px; margin: 15px auto; border-radius: 12px; 
      overflow: hidden; border: 3px solid #22c55e; background: black; 
    }
    .cam-box video { width: 100%; height: 100%; object-fit: cover; }
    .resumen { 
      text-align: left; background: #047857; padding: 18px; 
      border-radius: 10px; margin: 20px auto; max-width: 550px; line-height: 1.6; 
    }
    .warning { color: #facc15; font-weight: bold; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box" id="app"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzI0-rRxFOArP5HElYRY5MqQrJOqYRD-pzoeEA54x0eSV3_YFf5ZvpYC_V9gHdwhHM/exec";

    let paso = 1;
    let datos = {
      nombre: "", email: "", telefono: "", telefonoRef: "", redes: "",
      tipoUsuario: "", subTipo: "", area: "",
      horaInicio: "", horaFin: "", modalidad: "", ubicacion: "",
      horaInicio1: "", horaFin1: "", horaInicio2: "", horaFin2: "",
      diasPresencial: [], diasRemoto: [], cambios: "",
      videoPresentacion: "", cvUrl: "",
      base64Video1: "", base64CV: "", cvMimeType: "", cvExt: "",
      experienciaPrevia: "", textoRetiro: "",
      horariosPorDia: {}, dias: [],
      aceptaCompromiso: false
    };

    let stream, mediaRecorder, chunks = [];

    const areasPresencial = ["Infraestructura", "Relaciones Comunitarias", "Medio Ambiente", "Logística y Procesos"];

    async function enviarApi(payload) {
      try {
        const respuesta = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const textoRespuesta = await respuesta.text();
        return JSON.parse(textoRespuesta);
      } catch (error) {
        return { success: false, message: "Error de red al conectar con el servidor." };
      }
    }

    function render() {
      let html = "";

      switch(paso) {
        case 1:
          html = `
            <h2>👋 Hola. Bienvenido al Sistema de Entrevista de Sanilab</h2>
            <p>Mira este pequeño video para que nos conozcas mejor antes de iniciar:</p>
            <div class="tiktok-player">
              <iframe src="https://drive.google.com/file/d/1_kGf5wxshyt-Y1uDB3STOYvyFRt9BH5y/preview" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <button onclick="next()">Continuar</button>
          `;
          break;

        case 2: 
          html = `
            <h2>🧾 Tus Datos Personales</h2>
            <p style="font-size: 14px; color: #a7f3d0; margin-bottom: 20px;">Por favor, llena tus datos para poder comunicarnos contigo.</p>
            
            <img src="https://images.unsplash.com/photo-1516387938699-a93567ec168e?q=80&w=600&auto=format&fit=crop" style="width: 100%; max-width: 380px; border-radius: 12px; margin-bottom: 15px; border: 2px solid #047857;" alt="Contacto">
            
            <input id="nombre" type="text" placeholder="Nombre completo *" value="${datos.nombre}">
            <input id="email" type="email" placeholder="Correo electrónico *" value="${datos.email}">
            <input id="telefono" type="tel" placeholder="Tu Teléfono principal *" value="${datos.telefono}">
            
            <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin: 15px auto; width: 85%;">
                <p style="font-size: 14px; margin: 0 0 10px 0; color: #facc15; text-align: left;">Contacto de Emergencia/Referencia:</p>
                <input id="telefonoRef" type="tel" placeholder="Teléfono de referencia *" value="${datos.telefonoRef|| ''}" style="width: 100%; margin-top: 0;">
                <input id="vinculoRef" type="text" placeholder="¿Qué vínculo tienen? (Ej: Madre, Hermano) *" value="${datos.vinculoRef || ''}" style="width: 100%;">
            </div>

            <input id="redes" type="text" placeholder="Link de tu LinkedIn, Instagram o Facebook *" value="${datos.redes}">
            <button onclick="saveData()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 3:
          html = `
            <h2>🧑‍🎓 Perfil y Modalidad de Ingreso</h2>
            <p style="font-size: 14px; color: #a7f3d0; margin-bottom: 15px;">Selecciona cómo deseas unirte a Sanilab para ver los detalles:</p>

            <select id="tipoUsuario" onchange="actualizarInfoPerfil()">
              <option value="">Selecciona modalidad de ingreso...</option>
              <option value="Voluntario" ${datos.tipoUsuario==='Voluntario'?'selected':''}>Voluntario (Ad Honorem / Impacto Social)</option>
              <option value="Estudiante" ${datos.tipoUsuario==='Estudiante'?'selected':''}>Estudiante (Practicante)</option>
              <option value="Egresado" ${datos.tipoUsuario==='Egresado'?'selected':''}>Egresado (Remunerado / Negociable)</option>
            </select>
            
            <div id="infoPerfil" style="background: rgba(255,255,255,0.1); border: 1px dashed #22c55e; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; min-height: 60px; text-align: left; font-size: 14px; display: none;">
                <p id="textoInfo" style="margin:0; color: #fff;"></p>
            </div>

            <div id="subtipoDiv" style="display:${datos.tipoUsuario==='Estudiante'?'block':'none'}">
              <select id="subTipo">
                <option value="Practicante" ${datos.subTipo==='Practicante'?'selected':''}>Practicante Pre-Profesional</option>
                <option value="Remunerado" ${datos.subTipo==='Remunerado'?'selected':''}>Practicante con Subvención (Sujeto a vacante)</option>
              </select>
            </div>
            
            <select id="area" onchange="actualizarInfoPerfil()" style="margin-top: 10px;">
              <option value="">Área a postular...</option>
              ${["Proyectos", "Medio Ambiente", "Gerencia", "GTH", "Marketing", "Infraestructura", "Relaciones Comunitarias", "Taller", "Sistemas", "Comercial", "Logística y Procesos"]
                .map(a => `<option value="${a}" ${datos.area===a?'selected':''}>${a}</option>`).join('')}
            </select>
            
            <div id="msgAreaEspecial" class="warning" style="display:none; width:85%; margin: 10px auto; background: rgba(234, 179, 8, 0.1); border: 1px solid #eab308; border-radius: 6px; padding: 10px;"></div>

            <button onclick="guardarTipo()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          setTimeout(actualizarInfoPerfil, 50);
          break;

          case 4:
          html = `
            <h2>⏰ Disponibilidad de Horario</h2>
            <p style="font-size: 14px; color: #a7f3d0; margin-bottom: 20px;">
                Indica los días que puedes participar y escribe tu rango de horas disponible para cada uno (Ej: 8am - 1pm).
            </p>
            <p style="font-size: 14px; color: #facc15; font-weight: bold; margin-bottom: 20px;">
                La suma total de tus horas a la semana debe ser de 48 horas.
            </p>
            <div style="background: #064e3b; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857; box-sizing: border-box;">
              <p style="margin-top:0; color:#22c55e; font-weight:bold;">Selecciona tus días y horarios:</p>
              
              ${['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'].map(dia => `
                <div style="display: flex; align-items: center; margin-bottom: 12px; gap: 10px;">
                  <label style="flex: 0 0 100px; cursor:pointer;">
                    <input type="checkbox" class="cb-dia-dinamico" value="${dia}" 
                           onchange="toggleInputHorario('${dia}')"
                           ${datos.horariosPorDia[dia] ? 'checked' : ''}> ${dia}
                  </label>
                  <input type="text" id="input-hora-${dia}" 
                         placeholder="Ej: 9:00 - 13:00" 
                         style="display: ${datos.horariosPorDia[dia] ? 'block' : 'none'}; 
                                margin: 0; padding: 8px; width: 100%; font-size: 14px;"
                         value="${datos.horariosPorDia[dia] || ''}">
                </div>
              `).join('')}
            </div>

            <button onclick="guardarHorariosDinamicos()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;
          
        case 5:
          const esPresencialFijo = areasPresencial.includes(datos.area);
          let selectModalidadHtml = "";
          let advertenciaModalidadHtml = "";
          
          if (esPresencialFijo) {
            selectModalidadHtml = `
              <p style="margin-bottom:10px;">Tu área requiere trabajo estrictamente presencial:</p>
              <select id="modalidad" onchange="actualizarModalidad()">
                <option value="Presencial" selected>Presencial</option>
              </select>
            `;
            datos.modalidad = "Presencial";
          } else {
            selectModalidadHtml = `
              <select id="modalidad" onchange="actualizarModalidad()">
                <option value="">Selecciona modalidad...</option>
                <option value="Remoto" ${datos.modalidad==='Remoto'?'selected':''}>Remoto</option>
                <option value="Híbrido" ${datos.modalidad==='Híbrido'?'selected':''}>Híbrido</option>
              </select>
            `;
            if (datos.modalidad === "Presencial") datos.modalidad = "";
          }

          if (datos.modalidad === "Híbrido" && !esPresencialFijo) {
            advertenciaModalidadHtml = `
              <div class="warning" style="background: rgba(234, 179, 8, 0.1); padding: 10px; border-radius: 8px; border: 1px solid #eab308; margin: 15px auto; width: 85%;">
                  ⚠️ <strong>Nota:</strong> La presencialidad será a coordinar (1 o 2 veces por semana) en nuestra sede en Lima - Miraflores. Marque sus dias de preferencia</strong>.
              </div>
            `;
          }

          html = `
            <h2>🏢 Modalidad de Trabajo</h2>
            ${selectModalidadHtml}
            ${advertenciaModalidadHtml}
            
            <div id="ubicacionDiv" style="display:${datos.modalidad==='Presencial' || esPresencialFijo ? 'block' : 'none'}">
              <select id="ubicacion">
                <option value="">Elige tu sede...</option>
                <option value="Lima - Casaverde - Pachacamac" ${datos.ubicacion==='Lima - Casaverde - Pachacamac'?'selected':''}>Lima - Casaverde - Pachacamac</option>
              </select>
            </div>
            
            <div id="hibridoDiv" style="display:${datos.modalidad==='Híbrido' && !esPresencialFijo ? 'block' : 'none'}">
              <p>Distribuye tus <strong>${datos.dias.length} días</strong> disponibles:</p>
              <div style="display: flex; justify-content: space-between; max-width: 400px; margin: 0 auto; text-align: left; background: #047857; padding: 15px; border-radius: 8px;">
                <div style="width: 45%;">
                  <p style="color:#22c55e; font-weight:bold;">Presencial</p>
                  ${datos.dias.map(d => `<label style="display:block;"><input type="checkbox" class="cb-presencial" value="${d}" ${datos.diasPresencial.includes(d)?'checked':''}> ${d}</label>`).join('')}
                </div>
                <div style="width: 45%;">
                  <p style="color:#a7f3d0; font-weight:bold;">Remoto</p>
                  ${datos.dias.map(d => `<label style="display:block;"><input type="checkbox" class="cb-remoto" value="${d}" ${datos.diasRemoto.includes(d)?'checked':''}> ${d}</label>`).join('')}
                </div>
              </div>
            </div>
            <button onclick="guardarModalidad()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 6:
          html = `<h2>📱 Video Informativo</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1OlcWP62G7P6rPbgCmtNBixNzK9_puDWq/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button><br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;  

        case 7:
          html = `<h2>📈 Productividad</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1pFwlGdYD18-Xvw4Ml5v_Lsg7M4d4E6cx/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button><br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 8:
          html = `
            <h2>🚪 Experiencia Laboral</h2>
            <select id="expPrevia" onchange="actualizarExp()">
              <option value="">¿Tienes experiencia laboral previa?</option>
              <option value="Si" ${datos.experienciaPrevia==='Si'?'selected':''}>Sí</option>
              <option value="No" ${datos.experienciaPrevia==='No'?'selected':''}>No</option>
            </select>

            <div id="retiroDiv" style="display:${datos.experienciaPrevia==='Si'?'block':'none'}">
              <p style="margin-top:15px;">Cuéntanos brevemente el motivo de retiro de tu último empleo:</p>
              <textarea id="textoRetiro" rows="4">${datos.textoRetiro || ''}</textarea>
            </div>
            
            <button onclick="guardarRetiro()">Continuar</button><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 9:
          html = `
            <h2>📄 Sube tu CV</h2>
            <p>Por favor, sube tu Currículum Vitae (Formato PDF o Word).</p>
            <div style="background: #047857; padding: 20px; border-radius: 8px; margin: 15px auto; width: 85%;">
              <input type="file" id="cvUpload" accept=".pdf,.doc,.docx" style="width: 100%; color: white;">
            </div>
            <button onclick="guardarCVLocal()">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 10:
          html = `
            <h2>🤝 Compromiso y Reglas</h2>
            <p style="font-size: 14px; color: #a7f3d0; margin-bottom: 15px;">
                En Sanilab valoramos la responsabilidad. Lee nuestras normativas, marca la casilla de aceptación y sube tu video de confirmación.
            </p>
            <div style="background: #064e3b; padding: 20px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857; font-size: 14px; line-height: 1.6;">
                <ul style="padding-left: 20px; color: #fff; margin: 0;">
                    <li style="margin-bottom: 12px;">Comprendo que la modalidad y los horarios acordados son un compromiso serio con la organización.</li>
                    <li style="margin-bottom: 12px;">Acepto participar activamente en las reuniones y mantener una comunicación constante con mi equipo.</li>
                    <li style="margin-bottom: 0;"><strong>Política de Retiro:</strong> En caso de necesitar retirarme del proyecto, me comprometo a avisar con un mínimo de <strong>15 días de anticipación</strong> para realizar una correcta entrega de cargo.</li>
                </ul>
            </div>
            <div style="width: 85%; margin: 15px auto 25px auto; text-align: left; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
                <label style="display:flex; align-items:flex-start; cursor:pointer; color:#facc15; font-weight:bold; font-size: 15px;">
                    <input type="checkbox" id="checkCompromiso" style="width:auto; margin: 4px 10px 0 0;" ${datos.aceptaCompromiso ? 'checked' : ''}>
                    Sí, he leído, entiendo y acepto las reglas y mi compromiso con Sanilab.
                </label>
            </div>
            <p style="font-size: 14px; color: #a7f3d0; margin-bottom: 10px;">Lee en voz alta este texto para tu video:</p>
            <div style="background: #064e3b; padding: 20px; border-radius: 8px; margin: 0 auto 20px auto; width: 85%; text-align: center; border: 1px solid #facc15; font-size: 16px; font-style: italic; line-height: 1.6;">
                "Yo, <strong>${datos.nombre || '[Tu Nombre]'}</strong>, me comprometo formalmente a seguir las reglas y valores de Sanilab. Acepto cumplir con mis tareas asignadas, mantener comunicación constante y, en caso de retiro voluntario, notificar a la organización con un mínimo de 15 días de anticipación."
            </div>
            <div style="background: rgba(255,255,255,0.05); border: 2px dashed #22c55e; border-radius: 12px; padding: 20px 15px; width: 90%; margin: 15px auto; text-align: center;">
                <div class="cam-box"><video id="video" autoplay playsinline></video></div>
                <div class="botones-verticales">
                  <button class="btn-chico" onclick="startCam('video')">📷 Activar cámara</button>
                  <button class="btn-chico" onclick="startRec(1)" id="btnGrabar">🎥 Grabar</button>
                  <button class="btn-chico" onclick="stopRec()" id="btnDetener" disabled>⏹ Detener</button>
                </div>
                <div id="preview"></div>
                <hr style="border: 0; border-bottom: 1px solid #047857; margin: 20px 0;">
                <button class="btn-chico" onclick="descargarVideo()" style="margin-top:10px; background: #0284c7;">⬇️ Descargar Video</button>
                <div style="background: #047857; padding: 15px; border-radius: 8px; margin: 15px auto 0 auto; text-align: left; box-sizing: border-box;">
                  <p style="margin-top: 0; font-weight: bold; color: #facc15;">📤 Sube tu video aquí:</p>
                  <input type="file" id="videoUploadCompromiso" accept="video/*" style="width: 100%; padding: 5px; color: white;">
                  <p style="font-size: 13px; color: #a7f3d0; margin-top: 8px; margin-bottom: 0;">Tamaño máximo: 25 MB</p>
                </div>
            </div>
            <button onclick="guardarVideoCompromiso()">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 11:
          html = `
            <h2>✅ Resumen Final de tu Registro</h2>
            <div class="resumen">
              <p><strong>Nombre:</strong> ${datos.nombre}</p>
              <p><strong>Modalidad:</strong> ${datos.tipoUsuario}</p>
              <p><strong>Área:</strong> ${datos.area}</p>
              <p><strong>Días Elegidos:</strong> ${datos.dias.join(', ') || 'No especificado'}</p>
              <p><strong>Compromiso:</strong> Aceptado ✔️</p>
            </div>
            <button onclick="finalizarRegistro(event)" style="background:#22c55e; padding:14px 32px; font-size:18px;">Finalizar Entrevista</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;
      }

      document.getElementById("app").innerHTML = html;
    }

    function apagarCamara() { if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; } }
    async function startCam(id) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        document.getElementById(id).srcObject = stream;
      } catch(e) { alert("Activa permisos de cámara y micrófono."); }
    }
    
    function startRec(tipo) {
      if (!stream) return alert("Primero activa la cámara");
      document.getElementById("btnGrabar").disabled = true;
      document.getElementById("btnDetener").disabled = false;
      chunks = [];
      try { mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' }); } 
      catch (e) { mediaRecorder = new MediaRecorder(stream); }

      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
        document.getElementById("preview").innerHTML = `<video src="${url}" controls width="100%"></video><p style="color:#22c55e;">✅ Grabación finalizada. Descárgalo y súbelo abajo.</p>`;
      };
      mediaRecorder.start();
    }

    function stopRec() {
      if (mediaRecorder) mediaRecorder.stop();
      document.getElementById("btnGrabar").disabled = false;
      document.getElementById("btnDetener").disabled = true;
      apagarCamara();
    }

    function descargarVideo() {
      if (chunks.length === 0) return alert("Primero graba un video.");
      const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
      const a = document.createElement('a');
      a.style.display = 'none'; a.href = url; a.download = `Video_${datos.nombre || 'Sanilab'}.webm`;
      document.body.appendChild(a); a.click();
    }
    
    function saveData() { 
      datos.nombre = document.getElementById("nombre").value.trim();
      datos.email = document.getElementById("email").value.trim(); 
      datos.telefono = document.getElementById("telefono").value.trim(); 
      datos.telefonoRef = document.getElementById("telefonoRef").value.trim(); 
      datos.vinculoRef = document.getElementById("vinculoRef") ? document.getElementById("vinculoRef").value.trim() : "";
      datos.redes = document.getElementById("redes").value.trim(); 
      if (!datos.nombre || !datos.email || !datos.telefono || !datos.telefonoRef || !datos.vinculoRef) {
          return alert("Completa todos los datos obligatorios");
      }
      if (datos.telefono === datos.telefonoRef) {
          return alert("⚠️ ERROR: El teléfono de referencia no puede ser tu mismo número. Por favor, coloca el número de un contacto distinto e indica qué vínculo tienen.");
      }
      next(); 
    }
    
    function actualizarTipo() {
      const ts = document.getElementById("tipoUsuario"); const as = document.getElementById("area");
      if(ts) datos.tipoUsuario = ts.value; if(as) datos.area = as.value;
      render();
    }
    
    function guardarTipo() {
      datos.tipoUsuario = document.getElementById("tipoUsuario").value;
      datos.subTipo = datos.tipoUsuario === "Estudiante" ? document.getElementById("subTipo").value : "";
      datos.area = document.getElementById("area").value;
      if (!datos.tipoUsuario || !datos.area) return alert("Selecciona modalidad de ingreso y área.");
      next();
    }

    function toggleTurno2() {
      const isChecked = document.getElementById("checkTurno2").checked;
      document.getElementById("turno2Div").style.display = isChecked ? "flex" : "none";
      if (!isChecked) {
        document.getElementById("horaInicio2").value = "";
        document.getElementById("horaFin2").value = "";
      }
    }

    function guardarHorario() {
      datos.dias = Array.from(document.querySelectorAll('.cb-dia:checked')).map(cb => cb.value); 
      if (datos.dias.length === 0) return alert("Selecciona al menos un día.");
      datos.horaInicio1 = document.getElementById("horaInicio1").value; 
      datos.horaFin1 = document.getElementById("horaFin1").value;
      
      if (!datos.horaInicio1 || !datos.horaFin1) return alert("Ingresa las horas del Turno Principal.");
      
      const checkT2 = document.getElementById("checkTurno2").checked;
      const hI2 = document.getElementById("horaInicio2") ? document.getElementById("horaInicio2").value : "";
      const hF2 = document.getElementById("horaFin2") ? document.getElementById("horaFin2").value : "";

      if (checkT2 && (!hI2 || !hF2)) {
        return alert("Has activado el horario partido. Debes ingresar las horas del segundo turno o desmarcar la casilla.");
      }

      datos.horaInicio2 = checkT2 ? hI2 : "";
      datos.horaFin2 = checkT2 ? hF2 : "";
      
      datos.horaInicio = datos.horaInicio1; 
      datos.horaFin = datos.horaFin1;
      
      next();
    }

    function actualizarModalidad() { if(document.getElementById("modalidad")) datos.modalidad = document.getElementById("modalidad").value; render(); }
    
    function guardarModalidad() {
      const esPresencialFijo = areasPresencial.includes(datos.area);
      if(esPresencialFijo) datos.modalidad = "Presencial";
      else datos.modalidad = document.getElementById("modalidad").value;
      if (!datos.modalidad) return alert("Selecciona una modalidad.");
      if (datos.modalidad === "Presencial") {
        datos.ubicacion = document.getElementById("ubicacion").value;
        if(!datos.ubicacion) return alert("Selecciona una sede obligatoriamente.");
        datos.diasPresencial = []; datos.diasRemoto = []; 
      } else if (datos.modalidad === "Híbrido") {
        const pre = Array.from(document.querySelectorAll('.cb-presencial:checked')).map(cb => cb.value);
        const rem = Array.from(document.querySelectorAll('.cb-remoto:checked')).map(cb => cb.value);
        if (pre.length < 1) return alert("Debes seleccionar al menos 1 día en Presencial.");
        if (rem.length < 1) return alert("Debes seleccionar al menos 1 día en Remoto.");
        if (pre.length > 2) {
          return alert("❌ Solo se puede elegir un máximo de 2 días presenciales para la modalidad híbrida.");
        }
        if (pre.length + rem.length !== datos.dias.length) return alert(`Debes distribuir exactamente los ${datos.dias.length} días elegidos. Has asignado ${pre.length + rem.length}.`);
        const duplicados = pre.filter(dia => rem.includes(dia));
        if (duplicados.length > 0) return alert(`Error: Has marcado "${duplicados.join(", ")}" en ambas columnas. Elige solo un formato por día.`);
        datos.diasPresencial = pre; datos.diasRemoto = rem; datos.ubicacion = "Lima - Miraflores";
      } else {
        datos.ubicacion = ""; datos.diasPresencial = []; datos.diasRemoto = [];
      }
      next();
    }
    
    function guardarCambios() { datos.cambios = document.getElementById("cambios").value.trim(); next(); }

    function actualizarExp() { datos.experienciaPrevia = document.getElementById("expPrevia").value; render(); }
    
    function guardarRetiro() {
      if(!datos.experienciaPrevia) return alert("Selecciona una opción.");
      if(datos.experienciaPrevia === "Si") {
        datos.textoRetiro = document.getElementById("textoRetiro").value.trim();
        if(!datos.textoRetiro) return alert("Por favor escribe el motivo.");
      } else { datos.textoRetiro = "Sin experiencia previa"; }
      next();
    }

    function guardarVideoCompromiso() {
      const check = document.getElementById("checkCompromiso");
      if (!check || !check.checked) {
        return alert("⚠️ Debes marcar la casilla amarilla aceptando el compromiso y las reglas de Sanilab.");
      }
      const input = document.getElementById("videoUploadCompromiso");
      if (!input || input.files.length === 0) return alert("⚠️ Debes subir tu video leyendo el compromiso para poder finalizar.");
      const archivo = input.files[0];
      const limiteMB = 25;
      if (archivo.size > limiteMB * 1024 * 1024) {
        return alert(`❌ El video es muy pesado. El límite es de ${limiteMB} MB. Por favor, graba un video más corto leyendo solo el texto resaltado.`);
      }
      let reader = new FileReader();
      reader.onloadend = function () {
        datos.base64VideoCompromiso = reader.result.split(",");
        datos.aceptaCompromiso = true;
        next();
      };
      reader.readAsDataURL(archivo);
    }

    function guardarCVLocal() {
      const input = document.getElementById('cvUpload');
      if (!input || input.files.length === 0) return alert("Selecciona tu CV (PDF/Word).");
      
      const archivo = input.files[0];
      datos.cvMimeType = archivo.type;
      datos.cvExt = archivo.name.split('.').pop();
      
      let reader = new FileReader();
      reader.onloadend = function () {
        datos.base64CV = reader.result.split(",");
        next();
      };
      reader.readAsDataURL(archivo);
    }

    async function finalizarRegistro(e) {
      e.target.disabled = true; e.target.innerText = "⏳ Guardando...";
      const appDiv = document.getElementById("app");
      appDiv.innerHTML = `<h2>⏳ Procesando registro...</h2><p id="estadoProceso" style="color:#22c55e;">Iniciando...</p>`;
      const estado = document.getElementById('estadoProceso');
      
      try {
        if (datos.base64CV) {
          estado.innerText = "Subiendo CV (1/3)...";
          const resCV = await enviarApi({ accion: "subirCV", base64: datos.base64CV, nombre: datos.nombre, mimeType: datos.cvMimeType, extension: datos.cvExt });
          if (!resCV.success) throw new Error("Error en CV: " + (resCV.message || "Ocurrió un problema con el documento."));
          datos.cvUrl = resCV.url;
        }
        if (datos.base64VideoCompromiso) {
          estado.innerText = "Subiendo video de compromiso (2/3)...";
          const resV1 = await enviarApi({ accion: "guardarVideo", base64: datos.base64VideoCompromiso, tipo: 1, nombre: datos.nombre });
          if (!resV1.success) throw new Error("Error en video: " + (resV1.message || "Archivo muy pesado o error de red."));
          datos.videoCompromisoUrl = resV1.url;
        }
        estado.innerText = "Guardando datos (3/3)...";
        const resFinal = await enviarApi({ accion: "guardarRegistro", datos: datos });
        if (resFinal.success) { 
            appDiv.innerHTML = `
              <h2>🎉 ¡Registro Completado!</h2>
              <p>Tu postulación ha sido enviada exitosamente a nuestro sistema.</p>
              <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-top: 25px; border: 1px dashed #22c55e;">
                  <p style="color: #facc15; font-weight: bold; margin-bottom: 10px; font-size: 18px;">👇 Siguiente paso de tu entrevista:</p>
                  <p style="font-size: 15px; margin-bottom: 15px; color: #a7f3d0;">Nos comunicaremos en breve. Mientras tanto, preparate para la entrevista con este video.</p>
                  <div class="tiktok-player" style="margin: 0 auto;">
                    <iframe src="https://drive.google.com/file/d/1uXKmdZYM8s5jZlf8MbpUgBQG18VlWffn/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                  </div>
              </div>
            `; 
        }
        else { throw new Error(resFinal.message || "Fallo al guardar los textos en la hoja de cálculo."); }
      } catch (error) {
        appDiv.innerHTML = `<h2>❌ Ocurrió un error</h2><p style="color: #facc15;">${error.message}</p><br><button onclick="render()">Reintentar</button>`;
      }
    }

    function next() { 
      apagarCamara(); 
      paso++; 
      render(); 
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function prev() { 
      apagarCamara(); 
      if (paso > 1) { 
        paso--; 
        render(); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } 
    }
    function toggleInputHorario(dia) {
      const input = document.getElementById(`input-hora-${dia}`);
      const checkbox = document.querySelector(`.cb-dia-dinamico[value="${dia}"]`);
      input.style.display = checkbox.checked ? 'block' : 'none';
      if (!checkbox.checked) input.value = '';
    }
    function guardarHorariosDinamicos() {
      const checks = document.querySelectorAll('.cb-dia-dinamico:checked');
      if (checks.length === 0) return alert("Debes seleccionar al menos un día disponible.");
      datos.horariosPorDia = {};
      datos.dias = [];
      let faltaHorario = false;
      checks.forEach(cb => {
        const dia = cb.value;
        const hora = document.getElementById(`input-hora-${dia}`).value.trim();
        if (!hora) {
            faltaHorario = true;
        }
        datos.horariosPorDia[dia] = hora;
        datos.dias.push(dia);
      });
      if (faltaHorario) return alert("Por favor, escribe el horario para todos los días seleccionados.");
      next();
    }
    function actualizarInfoPerfil() {
        const tipo = document.getElementById("tipoUsuario").value;
        const infoPanel = document.getElementById("infoPerfil");
        const texto = document.getElementById("textoInfo");
        const msgArea = document.getElementById("msgAreaEspecial");
        const area = document.getElementById("area").value;
        if (!tipo) {
            infoPanel.style.display = "none";
        } else {
            infoPanel.style.display = "block";
            if (tipo === "Voluntario") {
                texto.innerHTML = "🌟 <strong>Voluntariado:</strong> Es una modalidad 100% ad-honorem. Te permite ganar experiencia real en proyectos de impacto socioambiental, ideal para construir tu CV y red de contactos profesional.";
            } else if (tipo === "Estudiante") {
                texto.innerHTML = "📚 <strong>Estudiante:</strong> Enfocado en tus prácticas profesionales o pre-profesionales. Sanilab apoya tu formación académica con flexibilidad para tus estudios.";
            } else if (tipo === "Egresado") {
                texto.innerHTML = "💼 <strong>Remunerado:</strong> Para perfiles que ya terminaron su formación. El monto está sujeto a negociación y disponibilidad de presupuesto en el área seleccionada.";
            }
        }
        if (areasPresencial.includes(area)) {
            msgArea.style.display = "block";
            msgArea.innerHTML = `⚠️ Debido a que postulas a <strong>${area}</strong>, el trabajo es estrictamente Presencial.`;
        } else {
            msgArea.style.display = "none";
        }
        const subtipoDiv = document.getElementById("subtipoDiv");
        if (subtipoDiv) subtipoDiv.style.display = (tipo === "Estudiante") ? "block" : "none";
    }
    function guardarCompromiso() {
      const check = document.getElementById("checkCompromiso");
      if (!check.checked) {
        return alert("⚠️ Debes aceptar el compromiso y las reglas de Sanilab para poder finalizar tu postulación.");
      }
      datos.aceptaCompromiso = true;
      next();
    }
    render();
  </script>
</body>
</html>
