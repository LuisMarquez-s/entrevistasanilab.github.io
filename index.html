<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanilab - Sistema de Registro</title>
  <link rel="icon" type="image/png" href="sanilab.png">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(rgba(2, 44, 34, 0.88), rgba(2, 44, 34, 0.88)), url('https://economiaverde.pe/wp-content/uploads/2019/04/sanilab-galeria4.jpg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white; 
      text-align: center; 
      padding: 20px; 
    }
    .box { 
      background: #064e3b;
      padding: 25px; 
      border-radius: 12px; 
      max-width: 720px; 
      margin: auto; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
    }
    input, select, textarea { 
      padding: 12px; 
      width: 85%; 
      margin: 10px auto; 
      display: block; 
      border-radius: 6px; 
      border: none; 
      font-size: 16px; 
    }
    button { 
      padding: 12px 28px; 
      margin: 10px 5px; 
      background: #22c55e; 
      border: none; 
      color: white; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 16px; 
      font-weight: bold; 
    }
    button:disabled { background: #047857; cursor: not-allowed; }
    button.atras { background: #047857; }
    .tiktok-player { 
      width: 100%; 
      max-width: 380px; 
      height: 620px; 
      margin: 15px auto; 
      border-radius: 12px; 
      overflow: hidden; 
      background: #000; 
    }
    .cam-box { 
      width: 260px; 
      height: 260px; 
      margin: 15px auto; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 3px solid #22c55e; 
      background: black; 
    }
    .cam-box video { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    .resumen { 
      text-align: left; 
      background: #047857;
      padding: 18px; 
      border-radius: 10px; 
      margin: 20px auto; 
      max-width: 550px; 
      line-height: 1.6; 
    }
    .warning { color: #eab308; font-weight: bold; }
    canvas { 
      border: 2px solid #22c55e; 
      border-radius: 8px; 
      background: white; 
    }
  </style>
</head>
<body>
  <div class="box" id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzI0-rRxFOArP5HElYRY5MqQrJOqYRD-pzoeEA54x0eSV3_YFf5ZvpYC_V9gHdwhHM/exec";

    let paso = 1;
    let datos = {
      nombre: "", email: "", telefono: "", telefonoRef: "", redes: "",
      tipoUsuario: "", subTipo: "", area: "", areaOtra: "",
      dias: [], horaInicio: "", horaFin: "", modalidad: "", ubicacion: "",
      horaInicio1: "", horaFin1: "", horaInicio2: "", horaFin2: "",
      diasPresencial: [], diasRemoto: [], cambios: "", firmaUrl: "",
      videoPresentacion: "", videoRetiro: "",
      base64Video1: "", base64Video3: "", base64Firma: ""
    };

    let signaturePad, stream, mediaRecorder, chunks = [];

    async function enviarApi(payload) {
      try {
        const respuesta = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        
        const textoRespuesta = await respuesta.text();
        return JSON.parse(textoRespuesta);
        
      } catch (error) {
        console.error("Error en la conexión con la API:", error);
        return { success: false, message: "Error de red al conectar con el servidor." };
      }
    }

    function render() {
      let html = "";

      switch(paso) {
        case 1:
          html = `
            <h2>👋 Hola. Bienvenido al Sistema de Entrevista de Sanilab</h2>
            <p>Ingresa tu nombre y apellido completo.Pero primero mira este pequeño video para que nos conozcas mejor:</p>
            <div class="tiktok-player">
              <iframe src="https://drive.google.com/file/d/1_kGf5wxshyt-Y1uDB3STOYvyFRt9BH5y/preview" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <input id="nombre" placeholder="Nombre completo *" value="${datos.nombre}">
            <button onclick="guardarNombre()">Continuar</button>
          `;
          break;

        case 2:
          html = `
            <h2>🎥 Preséntate</h2>
            <p>Ahora queremos conocerte mejor 😊. Mira este video y luego graba tu video de presentación.</p>
            <div class="tiktok-player">
              <iframe src="https://drive.google.com/file/d/1uXKmdZYM8s5jZlf8MbpUgBQG18VlWffn/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="cam-box"><video id="video" autoplay playsinline></video></div>
            <button onclick="startCam('video')">📷 Activar cámara</button>
            <button onclick="startRec(1)" id="btnGrabar">🎥 Grabar</button>
            <button onclick="stopRec()" id="btnDetener" disabled>⏹ Detener</button>

            <button onclick="descargarVideo()">⬇️ Descargar Video de Presentación</button>
            
            <div style="background: #047857; padding: 15px; border-radius: 8px; margin: 20px auto; width: 85%; text-align: left;">
              <p style="margin-top: 0;"><strong>📤 Sube tu video aquí para continuar:</strong></p>
              <input type="file" id="videoUpload1" accept="video/*" style="width: 100%; padding: 5px;">

            </div>

          html = `

            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1MZhtvEYAFAooVBbYT26nqbjwK8cqwSuT/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>

          break;

        case 4:
          html = `
            <h2>🧑‍🎓 Perfil y Área</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1NfGkPEZ44f6RjHCg_TNbkEfFST-ubI1J/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>

                <option value="Practicante" ${datos.subTipo==='Practicante'?'selected':''}>Practicante</option>

            <div id="egresadoDiv" style="display:${datos.tipoUsuario==='Egresado'?'block':'none'}; color:#eab308; margin:10px;">

            <select id="area" onchange="actualizarTipo()" style="margin-top: 20px;">
              <option value="">Área a postular...</option>
              <option value="Tecnología" ${datos.area==='Tecnología'?'selected':''}>Tecnología y Desarrollo</option>
              <option value="Psicología" ${datos.area==='Psicología'?'selected':''}>Psicología / RRHH</option>
              <option value="Proyectos Sociales" ${datos.area==='Proyectos Sociales'?'selected':''}>Proyectos Sociales</option>
              <option value="Otra" ${datos.area==='Otra'?'selected':''}>Otra...</option>

            <div id="areaOtraDiv" style="display:${datos.area==='Otra'?'block':'none'}">

            <div style="text-align:left; max-width:420px; margin:15px auto; background: #064e3b; padding: 15px; border-radius: 8px; border: 1px solid #047857;">
              <p style="margin-top:0; color:#22c55e; font-weight:bold;">1. Días disponibles:</p>

            <div style="background: #064e3b; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857;">
              <p style="margin-top:0; color:#22c55e; font-weight:bold;">2. Turno Principal:</p>
              <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Hora Inicio</label>
                  <input type="time" id="horaInicio1" style="width: 100%; margin-top: 5px;" value="${datos.horaInicio1 || ''}">
                </div>
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Hora Fin</label>
                  <input type="time" id="horaFin1" style="width: 100%; margin-top: 5px;" value="${datos.horaFin1 || ''}">
                </div>
              </div>
            </div>
            <div style="background: #064e3b; padding: 15px; border-radius: 8px; margin: 15px auto; width: 85%; text-align: left; border: 1px solid #047857;">
              <label style="display:flex; align-items:center; cursor:pointer; color:#3b82f6; font-weight:bold;">
                <input type="checkbox" id="checkTurno2" onchange="toggleTurno2()" ${datos.horaInicio2 ? 'checked' : ''} style="width:auto; margin:0 10px 0 0;">

              <div id="turno2Div" style="display:${datos.horaInicio2 ? 'flex' : 'none'}; gap: 10px; margin-top: 15px;">
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Regreso - Inicio</label>
                  <input type="time" id="horaInicio2" style="width: 100%; margin-top: 5px;" value="${datos.horaInicio2 || ''}">
                </div>
                <div style="flex: 1;">
                  <label style="font-size: 13px; color: #a7f3d0;">Salida Final</label>
                  <input type="time" id="horaFin2" style="width: 100%; margin-top: 5px;" value="${datos.horaFin2 || ''}">

            <button onclick="guardarHorario()">Continuar</button>
            <button onclick="prev()" class="atras">← Atrás</button>

              <option value="Presencial" ${datos.modalidad==='Presencial'?'selected':''}>Presencial</option>

            </select>

              <select id="ubicacion">

              </select>
            </div>
            <div id="hibridoDiv" style="display:${datos.modalidad==='Híbrido'?'block':'none'}">
              <p style="font-size:14px; margin-bottom:15px; color:#a7f3d0;">Selecciona exactamente 6 días en total (mínimo 1 y máximo 5 por columna).</p>
              <div style="display: flex; justify-content: space-between; max-width: 400px; margin: 0 auto; text-align: left; background: #047857; padding: 15px; border-radius: 8px;">
                <div style="width: 45%;">
                  <p style="font-size:15px; margin-top:0; margin-bottom:10px; font-weight:bold; color:#22c55e; border-bottom: 1px solid #475569; padding-bottom: 5px;">Presencial</p>
                  ${['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'].map(d => `<label style="display:block; margin-bottom:8px; cursor:pointer;"><input type="checkbox" class="cb-presencial" value="${d}" ${datos.diasPresencial.includes(d)?'checked':''}> ${d}</label>`).join('')}
                </div>
                <div style="width: 45%;">
                  <p style="font-size:15px; margin-top:0; margin-bottom:10px; font-weight:bold; color:#3b82f6; border-bottom: 1px solid #475569; padding-bottom: 5px;">Remoto</p>

                </div>

            </div>
            <br>
            <button onclick="guardarModalidad()">Continuar</button>
            <button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

      case 7:
          html = `
            <h2>📱 Video Informativo</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1OlcWP62G7P6rPbgCmtNBixNzK9_puDWq/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button>
            <button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;    

        case 8:
          html = `
            <h2>✍️ Solicitud de Cambios</h2>
            <textarea id="cambios" rows="5" placeholder="Ejemplo: Prefiero entrar más temprano los miércoles...">${datos.cambios || ''}</textarea>
            <button onclick="guardarCambios()">Continuar</button>
            <button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 9:
          html = `
            <h2>📈 Productividad</h2>
            <p>Mira este consejo rápido de productividad antes de continuar:.</p>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1senVZJhKpglTAGZe8_W7BQTVSUWzkCWC/preview" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe></div>
            <button onclick="next()">✅ He visto el video</button>
            <br><br>
            <button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        case 10:
          html = `
            <h2>🚪 Retiro de tu último empleo</h2>
            <div class="tiktok-player"><iframe src="https://drive.google.com/file/d/1E9aXiw2Fk-x3V5MKKNBk3uu6e3Q5BwTq/preview" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
            <div class="cam-box"><video id="video3" autoplay playsinline></video></div>
            <button onclick="startCam('video3')">📷 Activar cámara</button>
            <button id="btnGrabar" onclick="startRec(3)">🎥 Grabar</button>
            <button id="btnDetener" onclick="stopRec()" disabled>⏹ Detener</button>
            <div id="preview"></div>
            <p><strong>Descarga tu video antes de subirlo.</strong></p>
            <button onclick="descargarVideo()">⬇️ Descargar Video de Retiro</button>
            
            <div style="background: #047857; padding: 15px; border-radius: 8px; margin: 20px auto; width: 85%; text-align: left;">
              <p style="margin-top: 0;"><strong>📤 Sube tu video aquí para continuar:</strong></p>
              <input type="file" id="videoUpload3" accept="video/*" style="width: 100%; padding: 5px;">
              <p style="font-size: 13px; color: #a7f3d0; margin-bottom: 0;">Tamaño máximo: 30 MB</p>

          break;

        case 11:
          html = `<h2>✍️ Firma Digital</h2>
            <p>Por favor, sube una imagen de su firma.</p>
            <div class="upload-box">
              <input type="file" id="firmaUpload" accept="image/*" style="width: 100%;">
            </div>
            <button onclick="guardarFirmaLocal()">Continuar</button>
            <br><br><button onclick="prev()" class="atras">← Atrás</button>`;
          break;

        case 12:
          html = `
            <h2>✅ Resumen Final de tu Registro</h2>
            <div class="resumen">
              <p><strong>Nombre:</strong> ${datos.nombre}</p>
              <p><strong>Tipo:</strong> ${datos.tipoUsuario} ${datos.subTipo ? `(${datos.subTipo})` : ''}</p>
              <p><strong>Días:</strong> ${datos.dias.join(', ') || 'No especificado'}</p>
              <p><strong>Horario:</strong> ${datos.horaInicio2 ? datos.horaInicio + ' y ' + datos.horaFin : datos.horaInicio + ' - ' + datos.horaFin}</p>
            </div>
            <button onclick="finalizarRegistro(event)" style="background:#22c55e; padding:14px 32px; font-size:18px;">Finalizar Entrevista</button>
            <br><br>
            <button onclick="prev()" class="atras">← Atrás</button>
          `;
          break;

        default:
          html = `<h2>🎉 ¡Registro Completado!</h2><p>Gracias por registrarte en Sanilab.</p>`;
      }

      document.getElementById("app").innerHTML = html;

      if (paso === 11) {
        setTimeout(() => {
          const canvas = document.getElementById("canvasFirma");
          if (canvas) signaturePad = new SignaturePad(canvas);
        }, 100);
      }
    }

    function apagarCamara() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }
    async function startCam(id) {
      try {
        const constraints = {
          video: { 
            facingMode: "user",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }, 
          audio: true 
        };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        document.getElementById(id).srcObject = stream;
      } catch(e) {
        alert("Por favor activa los permisos de cámara y micrófono.");
      }
    }
    function startRec(tipo) {
      if (!stream) return alert("Primero activa la cámara");
      
      document.getElementById("btnGrabar").disabled = true;
      document.getElementById("btnDetener").disabled = false;
      
      chunks = [];
      
      const opciones = { 
        mimeType: 'video/webm;codecs=vp8,opus',
        videoBitsPerSecond: 1000000 
      };
      
      try {
        mediaRecorder = new MediaRecorder(stream, opciones);
      } catch (e) {
        mediaRecorder = new MediaRecorder(stream);
      }

      mediaRecorder.ondataavailable = e => chunks.push(e.data);

      mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        
        document.getElementById("preview").innerHTML = `
          <video src="${url}" controls width="100%"></video>
          <p style="color:#22c55e;">✅ Grabación finalizada. Haz clic en Descargar y súbelo abajo.</p>
        `;
      };

      mediaRecorder.start();

      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          stopRec();
          alert("⏱️ Se alcanzó el tiempo máximo de 2 minutos.");
        }
      }, 120000);
    }

    function stopRec() {
      if (mediaRecorder) mediaRecorder.stop();
      document.getElementById("btnGrabar").disabled = false;
      document.getElementById("btnDetener").disabled = true;
      apagarCamara();
    }

    function descargarVideo() {
      if (chunks.length === 0) return alert("Primero debes grabar un video.");
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = `Video_${datos.nombre || 'Sanilab'}.webm`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
    }
    function guardarNombre() { 
      datos.nombre = document.getElementById("nombre").value.trim(); 
      if(!datos.nombre) 
        return alert("Ingresa tu nombre"); 
      next(); 
    }
    function saveData() {
      datos.email = document.getElementById("email").value.trim(); 
      datos.telefono = document.getElementById("telefono").value.trim(); 
      datos.telefonoRef = document.getElementById("telefonoRef").value.trim(); 
      datos.redes = document.getElementById("redes").value.trim(); 
      if (!datos.email || !datos.telefono || !datos.telefonoRef || !datos.redes) {
        return alert("Por favor, completa todos los datos solicitados."); 
      }
      if (datos.telefono === datos.telefonoRef) {
        return alert("❌ El teléfono de referencia no puede ser igual a tu teléfono principal. Por favor ingresa el número de un familiar o contacto distinto.");
      }
      next(); 
    }
    function actualizarTipo() { 
      const tipoSelect = document.getElementById("tipoUsuario");
      const areaSelect = document.getElementById("area");
      if (tipoSelect) datos.tipoUsuario = tipoSelect.value; 
      if (areaSelect) datos.area = areaSelect.value;
      render(); 
    }
    function guardarTipo() { 
      datos.tipoUsuario = document.getElementById("tipoUsuario").value; 
      datos.subTipo = datos.tipoUsuario === "Estudiante" ? document.getElementById("subTipo").value : ""; 
      datos.area = document.getElementById("area").value;
      datos.areaOtra = datos.area === "Otra" ? document.getElementById("areaOtra").value.trim() : "";
      if (!datos.tipoUsuario) return alert("Por favor, selecciona tu tipo de usuario."); 
      if (!datos.area) return alert("Por favor, selecciona el área a postular.");
      if (datos.area === "Otra" && !datos.areaOtra) return alert("Por favor, escribe el nombre del área a la que postulas.");
      next(); 
    }
    function toggleTurno2() {
      const isChecked = document.getElementById("checkTurno2").checked;
      document.getElementById("turno2Div").style.display = isChecked ? "flex" : "none";
      if (!isChecked) {
        document.getElementById("horaInicio2").value = "";
        document.getElementById("horaFin2").value = "";
      }
    }
    function guardarHorario() { 
      const diasSeleccionados = Array.from(document.querySelectorAll('.cb-dia:checked')).map(cb => cb.value); 
      if (diasSeleccionados.length === 0) return alert("Debes seleccionar al menos un día disponible.");
      const hI1 = document.getElementById("horaInicio1").value;
      const hF1 = document.getElementById("horaFin1").value;
      if (!hI1 || !hF1) return alert("Debes ingresar las horas del Turno Principal.");
      const checkT2 = document.getElementById("checkTurno2").checked;
      const hI2 = document.getElementById("horaInicio2") ? document.getElementById("horaInicio2").value : "";
      const hF2 = document.getElementById("horaFin2") ? document.getElementById("horaFin2").value : "";
      if (checkT2 && (!hI2 || !hF2)) {
        return alert("Has activado el horario partido. Debes ingresar las horas de tu regreso o desmarcar la casilla.");
      }
      datos.dias = diasSeleccionados;
      datos.horaInicio1 = hI1;
      datos.horaFin1 = hF1;
      datos.horaInicio2 = checkT2 ? hI2 : "";
      datos.horaFin2 = checkT2 ? hF2 : "";
      if (checkT2) {
        datos.horaInicio = hI1 + " - " + hF1;
        datos.horaFin = hI2 + " - " + hF2;
      } else {
        datos.horaInicio = hI1;
        datos.horaFin = hF1;
      }
      next(); 
    }
    function actualizarModalidad() {
      datos.modalidad = document.getElementById("modalidad").value;
      render();
    }
    function guardarModalidad() {
      datos.modalidad = document.getElementById("modalidad").value;
      if (!datos.modalidad) return alert("Por favor, selecciona una modalidad.");
      if (datos.modalidad === "Presencial") {
        datos.ubicacion = document.getElementById("ubicacion").value;
        datos.diasPresencial = [];
        datos.diasRemoto = [];
      } 
      else if (datos.modalidad === "Híbrido") {
        const presencial = Array.from(document.querySelectorAll('.cb-presencial:checked')).map(cb => cb.value);
        const remoto = Array.from(document.querySelectorAll('.cb-remoto:checked')).map(cb => cb.value);
        const totalDias = presencial.length + remoto.length;
        if (presencial.length < 1) return alert("Debes seleccionar al menos 1 día en Presencial.");
        if (remoto.length < 1) return alert("Debes seleccionar al menos 1 día en Remoto.");
        if (presencial.length > 5) return alert("No puedes seleccionar más de 5 días en Presencial.");
        if (remoto.length > 5) return alert("No puedes seleccionar más de 5 días en Remoto.");
        if (totalDias !== 6) return alert("Debes seleccionar exactamente 6 días en total sumando ambas columnas. Has seleccionado " + totalDias + ".");
        const duplicados = presencial.filter(dia => remoto.includes(dia));
        if (duplicados.length > 0) {
          return alert("Error: Has marcado " + duplicados.join(", ") + " en ambas columnas. Elige solo un formato por día.");
        }
        datos.diasPresencial = presencial;
        datos.diasRemoto = remoto;
        datos.ubicacion = ""; 
      } 
      else {
        datos.ubicacion = "";
        datos.diasPresencial = [];
        datos.diasRemoto = [];
      }
      next();
    }
    function guardarCambios() { 
      datos.cambios = document.getElementById("cambios").value.trim(); 
      next(); 
    }
    function limpiarFirma() { 
      if (signaturePad) signaturePad.clear(); 
    }
    function guardarVideoLocal(tipo, inputId) {
      const input = document.getElementById(inputId);
      if (!input || input.files.length === 0) return alert("Selecciona el archivo de video para continuar.");
      const archivo = input.files[0];
      const limiteMB = 30;
      const limiteBytes = limiteMB * 1024 * 1024;
      if (archivo.size > limiteBytes) {
        return alert("❌ El video pesa más del límite permitido (" + limiteMB + " MB). Por favor, graba uno más corto o comprímelo.");
      }
      let reader = new FileReader();
      reader.onloadend = function () {
        const base64 = reader.result.split(",")[1];
        if (tipo === 1) datos.base64Video1 = base64;
        if (tipo === 3) datos.base64Video3 = base64;
        next();
      };
      reader.readAsDataURL(archivo);
    }
    function guardarFirmaLocal() {
      const input = document.getElementById('firmaUpload');
      if (!input || input.files.length === 0) return alert("Selecciona la imagen de tu firma para continuar.");
      let reader = new FileReader();
      reader.onloadend = function () {
        datos.base64Firma = reader.result.split(",")[1];
        next();
      };
      reader.readAsDataURL(input.files[0]);
    }
    async function finalizarRegistro(e) {
      const appDiv = document.getElementById("app");
      appDiv.innerHTML = `
        <h2>⏳ Procesando tu registro...</h2>
        <p>Por favor no cierres esta pestaña. Esto puede tardar unos minutos.</p>
        <p id="estadoProceso" style="color: #22c55e; font-weight: bold;">Iniciando...</p>
      `;
      const estado = document.getElementById('estadoProceso');
      try {
        if (datos.base64Video1) {
          estado.innerText = "Subiendo video de presentación (1/4)...";
          const resV1 = await enviarApi({ accion: "guardarVideo", base64: datos.base64Video1, tipo: 1, nombre: datos.nombre });
          if (!resV1.success) throw new Error("Falló el video de presentación.");
          datos.videoPresentacion = resV1.url;
        }
        if (datos.base64Video3) {
          estado.innerText = "Subiendo video de retiro (2/4)...";
          const resV3 = await enviarApi({ accion: "guardarVideo", base64: datos.base64Video3, tipo: 3, nombre: datos.nombre });
          if (!resV3.success) throw new Error("Falló el video de retiro.");
          datos.videoRetiro = resV3.url;
        }
        if (datos.base64Firma) {
          estado.innerText = "Subiendo firma digital (3/4)...";
          const resFirma = await enviarApi({ accion: "subirFirma", base64: datos.base64Firma, nombre: datos.nombre });
          if (!resFirma.success) throw new Error("Falló la firma digital.");
          datos.firmaUrl = resFirma.url;
        }
        estado.innerText = "Guardando registro final (4/4)...";
        const resFinal = await enviarApi({ accion: "guardarRegistro", datos: datos });
        
        if (resFinal.success) {
          appDiv.innerHTML = `<h2>🎉 ¡Registro Completado!</h2><p>${resFinal.message}</p><p>Nos pondremos en contacto con usted en breve`;
        } else {
          throw new Error("No se pudo guardar en la base de datos.");
        }

      } catch (error) {
        appDiv.innerHTML = `
          <h2>❌ Ocurrió un error</h2>
          <p>${error.message}</p>
          <p>Por favor, intenta nuevamente.</p>
          <button onclick="render()">Reintentar</button>
        `;
      }
    }
    function next() { 
      apagarCamara(); paso++; render(); 
    }
    function prev() { 
      apagarCamara(); 
      if (paso > 1) { 
        paso--; render(); 
      } 
    }
    render();
  </script>
</body>
